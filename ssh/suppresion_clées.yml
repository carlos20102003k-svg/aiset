- name: Supprimer une clé SSH
  hosts: 192.168.100.161
  become: yes

  vars:
    username: "{{ username }}"
    cle_a_supprimer: "{{ cle_a_supprimer }}"

  tasks:
    - name: Supprimer la clé publique dans authorized_keys
      authorized_key:
        user: "{{ username }}"
        state: absent
        key: "{{ cle_a_supprimer }}"
        path: "/home/{{ username }}/.ssh/authorized_keys"
