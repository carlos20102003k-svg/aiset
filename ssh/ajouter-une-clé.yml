- name: Ajouter une clé ssh
  hosts: 192.168.100.161
  become: yes

  vars:
    username: "user01"

    # Méthode multi‑ligne
    #raw_key: |
      #AAAAB3NzaC1yc2EAAAADAQABAAABAQDE0Fnfvp/6zXmY18ufIGHzPfhljnL7LFxe
      #Nm4wUnTxClCA3KI8EVO0v6bzuxf6SWvgNJ1WcuTBasceQksI9vRFIwwkyYLCo9ku
      #Hu4MZkn3vfhWeFX+nn2IbqnU22ZkPXF7CJFatesiVq4iOy1HbAg6QUntxwwvin7l
      #QAu9Zhwh9dXDufhRVJC3hBJtVTGeuP0ieofqOuy8cSE0V2Bs0Mv1b6XCfwSLUn6X
      #IXV/jysrsCI/wJcBkq3A+x52CSfjV/osPx7XdTRd/T1xnlktca0SGi3doPQ7Jp/o
      #gMAWDiMC9p7LA7aGLP+tY4bC9Ldeu325Worhy0nywypBLHQO4KmP
    
    ## Méthode sur une seule ligne
    single_line_key: ""

    ## Choix de la clé utilisée
    my_public_key: "ssh-rsa {{ single_line_key }} jeankey"
    
  tasks:
    - name: Créer l'utilisateur s'il n'existe pas
      user:
        name: "{{ username }}"
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Créer le dossier .ssh si absent
      file:
        path: "/home/{{ username }}/.ssh"
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: '0700'

    - name: Ajouter la clé publique dans authorized_keys
      authorized_key:
        user: "{{ username }}"
        state: present
        key: "{{ my_public_key }}"

    # 🔒 Sécurisation du dossier .ssh
    - name: Mettre root propriétaire du dossier .ssh
      file:
        path: "/home/{{ username }}/.ssh"
        owner: root
        group: root
        mode: '0755'

    # 🔒 Sécurisation du fichier authorized_keys
    - name: Mettre root propriétaire du fichier authorized_keys
      file:
        path: "/home/{{ username }}/.ssh/authorized_keys"
        owner: root
        group: root
        mode: '0644'
